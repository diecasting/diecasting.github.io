```yaml
# -----------------------------------------------------------------------------
# Site Settings
# -----------------------------------------------------------------------------

lang: en-US
timezone: Asia/Shanghai

title: "Die Casting & Precision Engineering Solutions"

tagline: >
  Expert Guides to Aluminum, Magnesium, Semi-Solid Die Casting,
  Mold Engineering and CNC Machining.

description: >
  Professional engineering articles covering aluminum die casting,
  magnesium die casting, semi-solid casting, high-pressure die casting,
  mold design, CNC machining, manufacturing quality control,
  and precision engineering solutions.

url: "https://diecasting.github.io"
baseurl: ""

theme_mode:

# -----------------------------------------------------------------------------
# Author
# -----------------------------------------------------------------------------

author:
  name: Hank

social:
  name: Hank
  links:
    - https://github.com/diecasting

# -----------------------------------------------------------------------------
# Avatar (Optional)
# -----------------------------------------------------------------------------

avatar: "/assets/img/avatar.png"

# -----------------------------------------------------------------------------
# SEO
# -----------------------------------------------------------------------------

social_preview_image: "/assets/img/cover.jpg"

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  tabs:
    output: true
    sort_by: order

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------

defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
      image: /assets/img/cover.jpg

  -
    scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# -----------------------------------------------------------------------------
# Markdown
# -----------------------------------------------------------------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# -----------------------------------------------------------------------------
# Sass
# -----------------------------------------------------------------------------

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Exclude
# -----------------------------------------------------------------------------

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives

# -----------------------------------------------------------------------------
# Feed
# -----------------------------------------------------------------------------

feed:
  path: feed.xml

# -----------------------------------------------------------------------------
# Sitemap
# -----------------------------------------------------------------------------

sitemap:
  filename: sitemap.xml

# -----------------------------------------------------------------------------
# Google Analytics
# 留空，等申请 GA4 后填写
# -----------------------------------------------------------------------------

google_analytics:

# -----------------------------------------------------------------------------
# Comments
# 留空，后续可接 Giscus
# -----------------------------------------------------------------------------

comments:

# -----------------------------------------------------------------------------
# Webmaster Verification
# -----------------------------------------------------------------------------

webmaster_verifications:
  google:
  bing:

# -----------------------------------------------------------------------------
# CDN
# -----------------------------------------------------------------------------

cdn:

# -----------------------------------------------------------------------------
# PWA
# -----------------------------------------------------------------------------

pwa:
  enabled: true
```
